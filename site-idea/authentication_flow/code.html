<script>
        // Simple UI interaction logic
        function switchTab(tab) {
            const signupView = document.getElementById('view-signup');
            const signinView = document.getElementById('view-signin');
            const slider = document.getElementById('auth-slider');
            const btnSignup = document.getElementById('btn-signup');
            const btnSignin = document.getElementById('btn-signin');
            const sharedFooter = document.getElementById('shared-footer');

            if (tab === 'signin') {
                // Animate Slider
                slider.style.transform = 'translateX(100%)';
                
                // Update Button Text Colors
                btnSignin.classList.replace('text-on-surface-variant', 'text-on-surface');
                btnSignup.classList.replace('text-on-surface', 'text-on-surface-variant');

                // Crossfade Views
                signupView.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => {
                    signupView.classList.add('hidden');
                    signinView.classList.remove('hidden');
                    // Small delay to allow display:block to apply before animating opacity
                    setTimeout(() => signinView.classList.replace('opacity-0', 'opacity-100'), 20);
                }, 300);

            } else {
                // Animate Slider
                slider.style.transform = 'translateX(0)';
                
                // Update Button Text Colors
                btnSignup.classList.replace('text-on-surface-variant', 'text-on-surface');
                btnSignin.classList.replace('text-on-surface', 'text-on-surface-variant');

                // Crossfade Views
                signinView.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => {
                    signinView.classList.add('hidden');
                    signupView.classList.remove('hidden');
                    setTimeout(() => signupView.classList.replace('opacity-0', 'opacity-100'), 20);
                }, 300);
            }
        }

        function setRole(role) {
            const customerBtn = document.getElementById('role-customer');
            const proBtn = document.getElementById('role-pro');
            const customerIcon = customerBtn.querySelector('.material-symbols-outlined');
            const proIcon = proBtn.querySelector('.material-symbols-outlined');
            const customerText = customerBtn.querySelector('span:last-child');
            const proText = proBtn.querySelector('span:last-child');

            if (role === 'customer') {
                // Activate Customer
                customerBtn.classList.add('border-2', 'border-primary-container', 'bg-surface-container-low');
                customerBtn.classList.remove('border', 'border-outline-variant', 'bg-surface-container-lowest', 'hover:bg-surface-container-low', 'hover:border-outline');
                customerIcon.classList.add('icon-fill', 'text-primary');
                customerIcon.classList.remove('text-on-surface-variant');
                customerText.classList.add('text-on-surface');
                customerText.classList.remove('text-on-surface-variant');

                // Deactivate Pro
                proBtn.classList.remove('border-2', 'border-primary-container', 'bg-surface-container-low');
                proBtn.classList.add('border', 'border-outline-variant', 'bg-surface-container-lowest', 'hover:bg-surface-container-low', 'hover:border-outline');
                proIcon.classList.remove('icon-fill', 'text-primary');
                proIcon.classList.add('text-on-surface-variant');
                proText.classList.remove('text-on-surface');
                proText.classList.add('text-on-surface-variant');
            } else {
                // Activate Pro
                proBtn.classList.add('border-2', 'border-primary-container', 'bg-surface-container-low');
                proBtn.classList.remove('border', 'border-outline-variant', 'bg-surface-container-lowest', 'hover:bg-surface-container-low', 'hover:border-outline');
                proIcon.classList.add('icon-fill', 'text-primary');
                proIcon.classList.remove('text-on-surface-variant');
                proText.classList.add('text-on-surface');
                proText.classList.remove('text-on-surface-variant');

                // Deactivate Customer
                customerBtn.classList.remove('border-2', 'border-primary-container', 'bg-surface-container-low');
                customerBtn.classList.add('border', 'border-outline-variant', 'bg-surface-container-lowest', 'hover:bg-surface-container-low', 'hover:border-outline');
                customerIcon.classList.remove('icon-fill', 'text-primary');
                customerIcon.classList.add('text-on-surface-variant');
                customerText.classList.remove('text-on-surface');
                customerText.classList.add('text-on-surface-variant');
            }
        }
    </script>
